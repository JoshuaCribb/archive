<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Archive">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<title>SYSTEM</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #intro-video {
    max-width: 100vw;
    max-height: 100dvh;
    width: auto;
    height: auto;
    display: block;
    object-fit: contain;
    background: #000;
    pointer-events: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  /* Tap-to-enter overlay — shown only when autoplay+audio is blocked */
  #gate {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    cursor: pointer;
    /* hidden by default; JS shows it only when needed */
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  #gate.visible {
    opacity: 1;
    pointer-events: all;
  }
  #gate-label {
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: clamp(10px, 2.5vw, 13px);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    opacity: 0.5;
    /* subtle pulse so the user knows to tap */
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50%       { opacity: 0.7; }
  }

  /* Smooth fade-to-black before redirect */
  #fade {
    position: fixed;
    inset: 0;
    background: #000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
    z-index: 10;
  }
  #fade.out { opacity: 1; }
</style>
</head>
<body>

<video
  id="intro-video"
  src="intro.mp4"
  playsinline
  disablepictureinpicture
  disableremoteplayback
  preload="auto"
></video>

<!-- shown only when the browser blocks autoplay with audio -->
<div id="gate">
  <span id="gate-label">WELCOME</span>
</div>

<div id="fade"></div>

<script>
(function () {
  const video = document.getElementById('intro-video');
  const gate  = document.getElementById('gate');
  const fade  = document.getElementById('fade');

  function goToLogin() {
    fade.classList.add('out');
    setTimeout(function () {
      window.location.replace('login.html');
    }, 500);
  }

  video.addEventListener('ended', goToLogin);
  video.addEventListener('error', goToLogin);

  function dismissGateAndPlay() {
    gate.classList.remove('visible');
    video.play().catch(function () { goToLogin(); });
  }

  gate.addEventListener('click',     dismissGateAndPlay);
  gate.addEventListener('touchstart', function (e) {
    e.preventDefault();          // prevent ghost click
    dismissGateAndPlay();
  }, { passive: false });

  // Try autoplay WITH audio first.
  // Browsers that allow it (desktop after prior interaction, some Android)
  // will just play. Browsers that block it will reject the promise → show gate.
  video.muted = false;
  var playPromise = video.play();

  if (playPromise !== undefined) {
    playPromise.catch(function () {
      // Autoplay with audio blocked — show the tap gate
      gate.classList.add('visible');
    });
  } else {
    // Older browsers: can't detect block, show gate to be safe
    gate.classList.add('visible');
  }
})();
</script>
</body>
</html>
