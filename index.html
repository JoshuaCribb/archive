<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Archive">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<title>SYSTEM</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #intro-video {
    max-width: 100vw;
    max-height: 100dvh;
    width: auto;
    height: auto;
    display: block;
    object-fit: contain;
    background: #000;
    pointer-events: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  #gate {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease;
  }
  #gate.visible {
    opacity: 1;
    pointer-events: all;
  }
  #gate-label {
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: clamp(10px, 2.5vw, 13px);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    opacity: 0.5;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50%       { opacity: 0.7; }
  }

  #fade {
    position: fixed;
    inset: 0;
    background: #000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
    z-index: 10;
  }
  #fade.out { opacity: 1; }
</style>
</head>
<body>

<video
  id="intro-video"
  src="intro.mp4"
  playsinline
  webkit-playsinline
  disablepictureinpicture
  disableremoteplayback
  preload="auto"
></video>

<div id="gate">
  <span id="gate-label">begin</span>
</div>

<div id="fade"></div>

<script>
(function () {
  var video = document.getElementById('intro-video');
  var gate  = document.getElementById('gate');
  var fade  = document.getElementById('fade');

  function goToLogin() {
    fade.classList.add('out');
    setTimeout(function () {
      window.location.replace('login.html');
    }, 500);
  }

  video.addEventListener('ended', goToLogin);
  video.addEventListener('error', goToLogin);

  // Start muted — works everywhere without a gesture
  video.muted = true;
  video.play().catch(function () {});

  // Always show the gate — all browsers (desktop and mobile) require
  // a user gesture before audio can play, no exceptions
  gate.classList.add('visible');

  function unlockAudio() {
    gate.classList.remove('visible');
    // Resume AudioContext first — this is what actually unlocks audio in Chrome
    var AudioContext = window.AudioContext || window.webkitAudioContext;
    if (AudioContext) {
      var ctx = new AudioContext();
      var src = ctx.createMediaElementSource(video);
      src.connect(ctx.destination);
      ctx.resume();
    }
    video.muted = false;
    video.currentTime = 0;
    video.play().catch(function () { goToLogin(); });
  }

  gate.addEventListener('click', unlockAudio);
  gate.addEventListener('touchend', function (e) {
    e.preventDefault();
    unlockAudio();
  }, { passive: false });
})();
</script>
</body>
</html>
