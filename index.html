<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Archive">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="manifest.json">
<script src="auth.js"></script>
<title>archive.</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100dvh;
    background: #0a0a0a;
    color: #e8e0d0;
    font-family: 'DM Mono', monospace;
    -webkit-font-smoothing: antialiased;
  }

  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 16px;
    border-bottom: 0.5px solid #222;
    position: sticky;
    top: 0;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 50;
  }

  #toolbar {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .tb-btn {
    background: transparent;
    border: 0.5px solid #333;
    border-radius: 4px;
    color: #888;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 5px 9px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 4px;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .tb-btn:hover, .tb-btn:active { border-color: #888; color: #e8e0d0; }

  #back-btn {
    background: transparent;
    border: 0.5px solid #2a1a1a;
    border-radius: 4px;
    color: #8aff6a;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 5px 9px;
    cursor: pointer;
    letter-spacing: 0.05em;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 4px;
    text-shadow: 0 0 6px rgba(138,255,106,0.5);
    -webkit-tap-highlight-color: transparent;
    text-decoration: none;
    flex-shrink: 0;
  }
  #back-btn:hover { border-color: #8aff6a; }

  #url-bar {
    display: none;
    gap: 8px;
    padding: 10px 16px;
    background: #0f0f0f;
    border-bottom: 0.5px solid #1a1a1a;
    align-items: center;
  }
  #url-bar.visible { display: flex; }

  #url-input {
    flex: 1;
    min-width: 0;
    background: #161616;
    border: 0.5px solid #2a2a2a;
    border-radius: 4px;
    color: #e8e0d0;
    font-family: 'DM Mono', monospace;
    font-size: 16px; /* prevent iOS zoom */
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.15s;
  }
  #url-input:focus { border-color: #555; }
  #url-input::placeholder { color: #444; }

  #add-url-btn {
    background: #e8e0d0;
    border: none;
    border-radius: 4px;
    color: #0a0a0a;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 7px 12px;
    cursor: pointer;
    letter-spacing: 0.05em;
    white-space: nowrap;
    flex-shrink: 0;
    touch-action: manipulation;
  }

  #drop-zone {
    display: none;
    margin: 12px 16px;
    border: 1px dashed #2a2a2a;
    border-radius: 6px;
    padding: 24px;
    text-align: center;
    color: #444;
    font-size: 11px;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.2s;
  }
  #drop-zone.visible { display: block; }
  #drop-zone.drag-over { border-color: #888; color: #888; background: #111; }
  #drop-zone i { font-size: 24px; display: block; margin-bottom: 8px; color: #333; }

  #sync-status {
    font-size: 10px;
    letter-spacing: 0.08em;
    color: #444;
    display: flex;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
  }
  #sync-status.syncing { color: #8aff6a; }
  #sync-status.error   { color: #ff6a6a; }

  #grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 3px;
    padding: 3px;
  }

  @media (min-width: 600px)  { #grid { grid-template-columns: repeat(3, 1fr); } }
  @media (min-width: 900px)  { #grid { grid-template-columns: repeat(4, 1fr); } }
  @media (min-width: 1200px) { #grid { grid-template-columns: repeat(5, 1fr); } }
  @media (min-width: 1600px) { #grid { grid-template-columns: repeat(6, 1fr); } }

  .grid-item {
    position: relative;
    aspect-ratio: 1;
    overflow: hidden;
    cursor: pointer;
    background: #111;
  }

  .grid-item img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94), opacity 0.3s;
    opacity: 0;
  }
  .grid-item img.loaded { opacity: 1; }
  .grid-item:hover img { transform: scale(1.04); }

  .grid-item .del-btn {
    position: absolute;
    top: 5px; right: 5px;
    background: rgba(0,0,0,0.7);
    border: none;
    border-radius: 50%;
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.2s;
    color: #ccc;
    font-size: 14px;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  @media (hover: none) { .grid-item .del-btn { opacity: 0.7; } }
  .grid-item:hover .del-btn { opacity: 1; }

  #empty-state {
    text-align: center;
    padding: 80px 20px;
    color: #333;
  }
  #empty-state i { font-size: 48px; display: block; margin-bottom: 16px; }
  #empty-state p { font-size: 12px; letter-spacing: 0.1em; line-height: 1.8; }

  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.97);
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  #lightbox.open { display: flex; }

  #lightbox-img {
    max-width: 92vw;
    max-height: 80dvh;
    object-fit: contain;
    border-radius: 2px;
    transition: opacity 0.2s;
    transform-origin: 0 0;
    touch-action: none;
    will-change: transform;
    user-select: none;
    -webkit-user-select: none;
    -webkit-user-drag: none;
    cursor: zoom-in;
  }
  #lightbox-img.zoomed { cursor: grab; }
  #lightbox-img.panning { cursor: grabbing; }

  #lb-stage {
    position: relative;
    width: 100%;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    touch-action: none;
  }

  #lightbox-nav {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-top: 20px;
    color: #555;
    font-size: 11px;
    letter-spacing: 0.1em;
  }

  .nav-arrow {
    background: transparent;
    border: 0.5px solid #333;
    border-radius: 4px;
    color: #888;
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 18px;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .nav-arrow:hover, .nav-arrow:active { border-color: #888; color: #e8e0d0; }

  #close-lb {
    position: absolute;
    top: 16px; right: 16px;
    background: transparent;
    border: 0.5px solid #333;
    border-radius: 4px;
    color: #888;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 18px;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  #close-lb:hover { border-color: #888; color: #e8e0d0; }

  #count-badge {
    font-size: 10px;
    color: #444;
    letter-spacing: 0.08em;
  }

  input[type=file] { display: none; }
</style>
</head>
<body>

<div id="topbar">
  <a href="control-panel.html" id="back-btn"><i class="ti ti-arrow-left"></i> control panel</a>
  <div id="toolbar">
    <span id="sync-status"><i class="ti ti-cloud"></i><span id="sync-text">loading</span></span>
    <span id="count-badge"></span>
    <button class="tb-btn" id="url-toggle-btn"><i class="ti ti-link"></i> URL</button>
    <button class="tb-btn" id="upload-toggle-btn"><i class="ti ti-upload"></i> upload</button>
    <button class="tb-btn" id="shuffle-btn"><i class="ti ti-arrows-shuffle"></i> shuffle</button>
  </div>
</div>

<div id="url-bar">
  <input id="url-input" type="url" inputmode="url" placeholder="paste image URL or Pinterest link…"
    autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"/>
  <button id="add-url-btn">add</button>
</div>

<div id="drop-zone">
  <i class="ti ti-photo-up"></i>
  drop images here, or tap to browse
</div>
<input type="file" id="file-input" accept="image/*" multiple>

<div id="grid"></div>
<div id="empty-state">
  <i class="ti ti-stack-2"></i>
  <p>your archive is empty.<br>add images via URL or upload to begin.</p>
</div>

<div id="lightbox" role="dialog" aria-modal="true" aria-label="image viewer">
  <button id="close-lb" aria-label="close"><i class="ti ti-x"></i></button>
  <div id="lb-stage">
    <img id="lightbox-img" src="" alt="full size preview" />
  </div>
  <div id="lightbox-nav">
    <button class="nav-arrow" id="prev-btn" aria-label="previous"><i class="ti ti-chevron-left"></i></button>
    <span id="lb-counter">1 / 1</span>
    <button class="nav-arrow" id="next-btn" aria-label="next"><i class="ti ti-chevron-right"></i></button>
  </div>
</div>

<script>
Auth.require();

// ── Supabase ─────────────────────────────────────────────────
const SB_URL = 'https://srunklqdxxuaicpzjrpz.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNydW5rbHFkeHh1YWljcHpqcnB6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNzY4MjEsImV4cCI6MjA5NDY1MjgyMX0.yBGqtYVBaHtJP07BD0mhBxdGI3s5CWRMLJU1ui96Ijo';
const TABLE  = 'archive_images';
const HDRS   = {
  'apikey': SB_KEY,
  'Authorization': 'Bearer ' + SB_KEY,
  'Content-Type': 'application/json',
  'Prefer': 'return=minimal'
};

async function dbLoad() {
  const r = await fetch(`${SB_URL}/rest/v1/${TABLE}?select=id,src,type,created_at&order=created_at.asc`, { headers: HDRS });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function dbInsert(row) {
  const r = await fetch(`${SB_URL}/rest/v1/${TABLE}`, { method: 'POST', headers: HDRS, body: JSON.stringify(row) });
  if (!r.ok) throw new Error(await r.text());
}
async function dbDelete(id) {
  const r = await fetch(`${SB_URL}/rest/v1/${TABLE}?id=eq.${encodeURIComponent(id)}`, { method: 'DELETE', headers: HDRS });
  if (!r.ok) throw new Error(await r.text());
}

// ── App ───────────────────────────────────────────────────────
(async () => {
  let images   = [];
  let lbIndex  = 0;
  let _lbImages = [];

  const grid       = document.getElementById('grid');
  const emptyState = document.getElementById('empty-state');
  const countBadge = document.getElementById('count-badge');
  const syncStatus = document.getElementById('sync-status');
  const syncText   = document.getElementById('sync-text');
  const lightbox   = document.getElementById('lightbox');
  const lbImg      = document.getElementById('lightbox-img');
  const lbCounter  = document.getElementById('lb-counter');
  const urlBar     = document.getElementById('url-bar');
  const dropZone   = document.getElementById('drop-zone');
  const fileInput  = document.getElementById('file-input');
  const urlInput   = document.getElementById('url-input');

  function setSync(state, msg) {
    syncStatus.className = state;
    syncText.textContent = msg;
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  async function loadImages() {
    setSync('syncing', 'syncing…');
    try {
      images = await dbLoad();
      setSync('', 'synced');
      countBadge.textContent = images.length + ' image' + (images.length !== 1 ? 's' : '');
    } catch(e) {
      console.error(e);
      setSync('error', 'offline');
    }
    renderGrid(true);
  }

  async function addImage(row) {
    setSync('syncing', 'saving…');
    try {
      await dbInsert(row);
      images.push(row);
      setSync('', 'synced');
      countBadge.textContent = images.length + ' image' + (images.length !== 1 ? 's' : '');
      renderGrid();
    } catch(e) {
      console.error(e);
      setSync('error', 'save failed');
    }
  }

  async function deleteImage(id) {
    setSync('syncing', 'deleting…');
    try {
      await dbDelete(id);
      images = images.filter(i => i.id !== id);
      setSync('', 'synced');
      countBadge.textContent = images.length + ' image' + (images.length !== 1 ? 's' : '');
      renderGrid();
    } catch(e) {
      console.error(e);
      setSync('error', 'delete failed');
    }
  }

  function renderGrid(doShuffle = false) {
    const display = doShuffle ? shuffle(images) : images;
    grid.innerHTML = '';
    emptyState.style.display = display.length ? 'none' : 'block';

    display.forEach((img, idx) => {
      const item = document.createElement('div');
      item.className = 'grid-item';

      const el = document.createElement('img');
      el.alt = '';
      el.onload = () => el.classList.add('loaded');
      el.onerror = () => {};
      el.src = img.src;

      const del = document.createElement('button');
      del.className = 'del-btn';
      del.setAttribute('aria-label', 'remove');
      del.innerHTML = '<i class="ti ti-x"></i>';
      del.addEventListener('click', e => { e.stopPropagation(); deleteImage(img.id); });

      item.appendChild(el);
      item.appendChild(del);
      item.addEventListener('click', () => { lbIndex = idx; openLightbox(display); });
      grid.appendChild(item);
    });
  }

  // ── Lightbox ─────────────────────────────────────────────────
  function openLightbox(imgs) {
    _lbImages = imgs;
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
    showLbImage();
    document.addEventListener('keydown', handleKey);
  }
  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
    document.removeEventListener('keydown', handleKey);
  }
  function showLbImage() {
    resetZoom();
    lbImg.style.opacity = 0;
    lbImg.src = _lbImages[lbIndex].src;
    lbImg.onload = () => { lbImg.style.opacity = 1; resetZoom(); };
    lbCounter.textContent = (lbIndex + 1) + ' / ' + _lbImages.length;
  }
  function handleKey(e) {
    if (e.key === 'Escape')      closeLightbox();
    if (e.key === 'ArrowRight')  { lbIndex = (lbIndex + 1) % _lbImages.length; showLbImage(); }
    if (e.key === 'ArrowLeft')   { lbIndex = (lbIndex - 1 + _lbImages.length) % _lbImages.length; showLbImage(); }
    if (e.key === '0' || e.key === 'Escape') resetZoom();
  }

  // ── Zoom & pan ─────────────────────────────────────────────────
  const lbStage = document.getElementById('lb-stage');
  const MIN_SCALE = 1;
  const MAX_SCALE = 6;
  let scale = 1, tx = 0, ty = 0;
  const activePointers = new Map();
  let pinchStartDist = 0, pinchStartScale = 1, pinchMid = { x: 0, y: 0 };
  let panLastX = 0, panLastY = 0, panMoved = false;

  function applyTransform() {
    lbImg.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
    lbImg.classList.toggle('zoomed', scale > 1.001);
  }
  function resetZoom() {
    scale = 1; tx = 0; ty = 0;
    applyTransform();
    lbImg.classList.remove('panning');
  }
  function clampPan() {
    // Allow image to be panned but keep some of it onscreen
    const rect = lbImg.getBoundingClientRect();
    const sRect = lbStage.getBoundingClientRect();
    // No clamping at scale 1
    if (scale <= 1.001) { tx = 0; ty = 0; return; }
    const maxX = Math.max(0, (rect.width - sRect.width) / 2 + 40);
    const maxY = Math.max(0, (rect.height - sRect.height) / 2 + 40);
    if (tx >  maxX) tx =  maxX;
    if (tx < -maxX) tx = -maxX;
    if (ty >  maxY) ty =  maxY;
    if (ty < -maxY) ty = -maxY;
  }
  function zoomAt(clientX, clientY, newScale) {
    newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, newScale));
    const rect = lbImg.getBoundingClientRect();
    // Point on the image (in image-local coords before transform)
    const imgCenterX = rect.left + rect.width / 2;
    const imgCenterY = rect.top + rect.height / 2;
    const offsetX = clientX - imgCenterX;
    const offsetY = clientY - imgCenterY;
    const ratio = newScale / scale;
    tx = (tx - offsetX) * ratio + offsetX;
    ty = (ty - offsetY) * ratio + offsetY;
    scale = newScale;
    if (scale <= 1.001) { scale = 1; tx = 0; ty = 0; }
    clampPan();
    applyTransform();
  }

  // Wheel zoom (desktop)
  lbStage.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = Math.exp(-e.deltaY * 0.0015);
    zoomAt(e.clientX, e.clientY, scale * factor);
  }, { passive: false });

  // Double-click toggle zoom
  lbImg.addEventListener('dblclick', e => {
    e.preventDefault();
    if (scale > 1.001) resetZoom();
    else zoomAt(e.clientX, e.clientY, 2.5);
  });

  // Pointer-based pan + pinch
  lbImg.addEventListener('pointerdown', e => {
    if (e.button && e.button !== 0) return;
    lbImg.setPointerCapture(e.pointerId);
    activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    panMoved = false;

    if (activePointers.size === 2) {
      // Start pinch
      const pts = Array.from(activePointers.values());
      pinchStartDist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y) || 1;
      pinchStartScale = scale;
      pinchMid = { x: (pts[0].x + pts[1].x) / 2, y: (pts[0].y + pts[1].y) / 2 };
    } else if (activePointers.size === 1) {
      panLastX = e.clientX;
      panLastY = e.clientY;
      if (scale > 1.001) lbImg.classList.add('panning');
    }
  });

  lbImg.addEventListener('pointermove', e => {
    if (!activePointers.has(e.pointerId)) return;
    activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

    if (activePointers.size === 2) {
      const pts = Array.from(activePointers.values());
      const dist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y) || 1;
      const newScale = pinchStartScale * (dist / pinchStartDist);
      zoomAt(pinchMid.x, pinchMid.y, newScale);
      panMoved = true;
    } else if (activePointers.size === 1 && scale > 1.001) {
      const dx = e.clientX - panLastX;
      const dy = e.clientY - panLastY;
      panLastX = e.clientX;
      panLastY = e.clientY;
      tx += dx; ty += dy;
      if (Math.abs(dx) + Math.abs(dy) > 2) panMoved = true;
      clampPan();
      applyTransform();
    }
  });

  function endPointer(e) {
    if (activePointers.has(e.pointerId)) activePointers.delete(e.pointerId);
    lbImg.classList.remove('panning');
  }
  lbImg.addEventListener('pointerup', endPointer);
  lbImg.addEventListener('pointercancel', endPointer);
  lbImg.addEventListener('pointerleave', endPointer);

  // Swipe nav on stage — only when not zoomed
  let lbTouchX = 0, lbTouchY = 0, lbTouchActive = false;
  lbStage.addEventListener('touchstart', e => {
    if (scale > 1.001 || e.touches.length !== 1) { lbTouchActive = false; return; }
    lbTouchActive = true;
    lbTouchX = e.changedTouches[0].clientX;
    lbTouchY = e.changedTouches[0].clientY;
  }, { passive: true });
  lbStage.addEventListener('touchend', e => {
    if (!lbTouchActive || scale > 1.001) return;
    const dx = e.changedTouches[0].clientX - lbTouchX;
    const dy = e.changedTouches[0].clientY - lbTouchY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
      lbIndex = dx < 0 ? (lbIndex + 1) % _lbImages.length : (lbIndex - 1 + _lbImages.length) % _lbImages.length;
      showLbImage();
    }
  }, { passive: true });

  document.getElementById('close-lb').addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', e => {
    // Only close when clicking the backdrop, and ignore clicks that came from a pan gesture
    if (e.target === lightbox && !panMoved) closeLightbox();
  });
  document.getElementById('next-btn').addEventListener('click', () => { lbIndex = (lbIndex + 1) % _lbImages.length; showLbImage(); });
  document.getElementById('prev-btn').addEventListener('click', () => { lbIndex = (lbIndex - 1 + _lbImages.length) % _lbImages.length; showLbImage(); });

  document.getElementById('shuffle-btn').addEventListener('click', () => renderGrid(true));

  // ── URL add ───────────────────────────────────────────────────
  document.getElementById('url-toggle-btn').addEventListener('click', () => {
    urlBar.classList.toggle('visible');
    dropZone.classList.remove('visible');
    if (urlBar.classList.contains('visible')) urlInput.focus();
  });
  document.getElementById('upload-toggle-btn').addEventListener('click', () => {
    dropZone.classList.toggle('visible');
    urlBar.classList.remove('visible');
  });
  document.getElementById('add-url-btn').addEventListener('click', addFromUrl);
  urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') addFromUrl(); });

  function isPinterest(url) {
    return /pinterest\.(com|co\.[a-z]+)|pin\.it/i.test(url);
  }

  async function resolvePinterest(url) {
    const r = await fetch('/api/pinterest?url=' + encodeURIComponent(url));
    if (!r.ok) throw new Error('Pinterest API failed');
    const data = await r.json();
    if (data.img) return data.img;
    throw new Error(data.error || 'No image found');
  }

  async function addFromUrl() {
    const url = urlInput.value.trim();
    if (!url) return;
    urlInput.value = '';
    urlBar.classList.remove('visible');

    if (isPinterest(url)) {
      setSync('syncing', 'resolving…');
      try {
        const imgUrl = await resolvePinterest(url);
        addImage({ id: crypto.randomUUID(), src: imgUrl, type: 'url' });
      } catch(e) {
        console.error(e);
        setSync('error', 'pinterest failed');
        // Fall back to raw URL in case it's a direct image link
        addImage({ id: crypto.randomUUID(), src: url, type: 'url' });
      }
    } else {
      addImage({ id: crypto.randomUUID(), src: url, type: 'url' });
    }
  }

  // ── File upload ───────────────────────────────────────────────
  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); handleFiles(e.dataTransfer.files); });
  fileInput.addEventListener('change', e => handleFiles(e.target.files));

  function handleFiles(files) {
    Array.from(files).forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => addImage({ id: crypto.randomUUID(), src: ev.target.result, type: 'file' });
      reader.readAsDataURL(file);
    });
    dropZone.classList.remove('visible');
  }

  // ── Boot ──────────────────────────────────────────────────────
  loadImages();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
})();
</script>
</body>
