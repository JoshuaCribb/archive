<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Archive">
<meta name="theme-color" content="#080808">
<link rel="manifest" href="manifest.json">
<script src="auth.js"></script>
<title>archive.</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080808;
    --surface: #111111;
    --border: #222222;
    --border-hover: #3a3a3a;
    --text: #ede8df;
    --text-dim: #555;
    --text-muted: #333;
    --accent: #ede8df;
    --font: 'Futura', 'Century Gothic', 'Trebuchet MS', sans-serif;
    --mono: 'Courier New', monospace;
    --radius: 3px;
    --topbar-h: 52px;
  }

  html { background: var(--bg); }

  body {
    min-height: 100dvh;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ── Topbar ── */
  #topbar {
    height: var(--topbar-h);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(8,8,8,0.96);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 50;
  }

  #back-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    color: var(--text);
    text-decoration: none;
    font-family: var(--font);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0.5;
    transition: opacity 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  #back-btn:hover { opacity: 1; }
  #back-btn i { font-size: 14px; }

  #wordmark {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--font);
    font-size: 13px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text);
    font-weight: 500;
    pointer-events: none;
    user-select: none;
  }

  #toolbar {
    display: flex;
    align-items: center;
    gap: 2px;
  }

  .tb-btn {
    position: relative;
    background: transparent;
    border: none;
    border-radius: var(--radius);
    color: var(--text-dim);
    font-size: 18px;
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    flex-shrink: 0;
  }
  .tb-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  .tb-btn.active { color: var(--text); }

  .tb-btn .tip {
    position: absolute;
    bottom: -28px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    font-family: var(--font);
  }
  .tb-btn:hover .tip { opacity: 1; }

  #divider-v {
    width: 1px;
    height: 18px;
    background: var(--border);
    margin: 0 6px;
    flex-shrink: 0;
  }

  #count-badge {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-family: var(--font);
    margin-right: 4px;
    white-space: nowrap;
  }

  #sync-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--text-muted);
    flex-shrink: 0;
    transition: background 0.3s;
    margin-right: 2px;
  }
  #sync-dot.syncing { background: #6affb8; box-shadow: 0 0 6px rgba(106,255,184,0.5); }
  #sync-dot.error   { background: #ff6a6a; }

  /* ── Input drawer ── */
  #input-drawer {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s cubic-bezier(0.4,0,0.2,1);
    border-bottom: 1px solid transparent;
  }
  #input-drawer.open {
    max-height: 200px;
    border-bottom-color: var(--border);
  }

  #input-inner {
    padding: 14px 20px;
    background: var(--surface);
  }

  .drawer-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .drawer-tab {
    font-family: var(--font);
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    background: transparent;
    border: none;
    padding: 0 0 10px;
    margin-right: 20px;
    cursor: pointer;
    position: relative;
    transition: color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .drawer-tab::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0; right: 0;
    height: 1px;
    background: var(--text);
    transform: scaleX(0);
    transition: transform 0.2s;
  }
  .drawer-tab.active { color: var(--text); }
  .drawer-tab.active::after { transform: scaleX(1); }

  #tab-url-panel, #tab-upload-panel {
    display: none;
  }
  #tab-url-panel.active, #tab-upload-panel.active {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #url-input {
    flex: 1;
    min-width: 0;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    letter-spacing: 0.05em;
    padding: 6px 0;
    outline: none;
    transition: border-color 0.15s;
    font-size: 16px; /* prevent iOS zoom */
  }
  #url-input:focus { border-bottom-color: var(--text-dim); }
  #url-input::placeholder { color: var(--text-muted); font-size: 12px; }

  #add-url-btn {
    background: var(--text);
    border: none;
    border-radius: var(--radius);
    color: var(--bg);
    font-family: var(--font);
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 8px 14px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: opacity 0.15s;
    touch-action: manipulation;
  }
  #add-url-btn:hover { opacity: 0.85; }

  #drop-zone {
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    padding: 18px;
    text-align: center;
    color: var(--text-muted);
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
  }
  #drop-zone:hover,
  #drop-zone.drag-over { border-color: var(--text-dim); color: var(--text-dim); }
  #drop-zone i { font-size: 20px; display: block; margin-bottom: 6px; opacity: 0.4; }

  /* ── Grid ── */
  #grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 2px;
    padding: 2px;
  }

  @media (min-width: 540px)  { #grid { grid-template-columns: repeat(3, 1fr); } }
  @media (min-width: 800px)  { #grid { grid-template-columns: repeat(4, 1fr); } }
  @media (min-width: 1100px) { #grid { grid-template-columns: repeat(5, 1fr); } }
  @media (min-width: 1400px) { #grid { grid-template-columns: repeat(6, 1fr); } }
  @media (min-width: 1800px) { #grid { grid-template-columns: repeat(7, 1fr); } }

  .grid-item {
    position: relative;
    aspect-ratio: 1;
    overflow: hidden;
    cursor: pointer;
    background: var(--surface);
  }

  .grid-item img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94), opacity 0.4s;
    opacity: 0;
    will-change: transform;
  }
  .grid-item img.loaded { opacity: 1; }
  .grid-item:hover img { transform: scale(1.05); }

  .grid-item .del-btn {
    position: absolute;
    top: 7px;
    right: 7px;
    background: rgba(8,8,8,0.8);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 50%;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.2s, background 0.15s;
    color: var(--text);
    font-size: 12px;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    backdrop-filter: blur(4px);
  }
  @media (hover: none) { .grid-item .del-btn { opacity: 0.6; } }
  .grid-item:hover .del-btn { opacity: 1; }
  .del-btn:hover { background: rgba(255,80,80,0.3) !important; }

  /* ── Empty state ── */
  #empty-state {
    display: none;
    text-align: center;
    padding: 100px 20px;
    color: var(--text-muted);
  }
  #empty-state i { font-size: 36px; display: block; margin-bottom: 16px; opacity: 0.3; }
  #empty-state p {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    line-height: 2.2;
  }
  #empty-state.visible { display: block; }

  /* ── Lightbox ── */
  #lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(4,4,4,0.98);
    z-index: 200;
    flex-direction: column;
    align-items: stretch;
  }
  #lightbox.open { display: flex; }

  #lb-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    height: 52px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #lb-counter {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    font-family: var(--font);
  }

  #lb-actions {
    display: flex;
    gap: 2px;
    align-items: center;
  }

  .lb-btn {
    background: transparent;
    border: none;
    border-radius: var(--radius);
    color: var(--text-dim);
    font-size: 18px;
    width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .lb-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }

  #lb-stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    touch-action: none;
    position: relative;
  }

  #lightbox-img {
    max-width: 90vw;
    max-height: 100%;
    object-fit: contain;
    border-radius: 1px;
    transition: opacity 0.2s;
    transform-origin: 0 0;
    touch-action: none;
    will-change: transform;
    user-select: none;
    -webkit-user-select: none;
    -webkit-user-drag: none;
    cursor: zoom-in;
    display: block;
  }
  #lightbox-img.zoomed { cursor: grab; }
  #lightbox-img.panning { cursor: grabbing; }

  #lb-footer {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 0 16px;
    height: 64px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .nav-arrow {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-dim);
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 16px;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .nav-arrow:hover, .nav-arrow:active {
    border-color: var(--border-hover);
    color: var(--text);
    background: rgba(255,255,255,0.04);
  }

  /* Swipe hint — only on touch devices, fades after first open */
  #swipe-hint {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-family: var(--font);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s;
    white-space: nowrap;
  }
  #swipe-hint.show { opacity: 1; }

  input[type=file] { display: none; }

  /* Skeleton shimmer for loading state */
  .grid-item::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, var(--surface) 0%, #1a1a1a 50%, var(--surface) 100%);
    background-size: 200% 100%;
    animation: shimmer 1.6s ease-in-out infinite;
    opacity: 1;
    transition: opacity 0.3s;
  }
  .grid-item.img-loaded::before { opacity: 0; }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- Topbar -->
<div id="topbar">
  <a href="control-panel.html" id="back-btn">
    <i class="ti ti-arrow-left"></i>
    <span>Back</span>
  </a>

  <div id="wordmark">Archive</div>

  <div id="toolbar">
    <div id="sync-dot"></div>
    <span id="count-badge"></span>
    <div id="divider-v"></div>
    <button class="tb-btn" id="url-toggle-btn" aria-label="Add by URL">
      <i class="ti ti-link"></i>
      <span class="tip">URL</span>
    </button>
    <button class="tb-btn" id="upload-toggle-btn" aria-label="Upload image">
      <i class="ti ti-upload"></i>
      <span class="tip">Upload</span>
    </button>
    <button class="tb-btn" id="shuffle-btn" aria-label="Shuffle">
      <i class="ti ti-arrows-shuffle"></i>
      <span class="tip">Shuffle</span>
    </button>
  </div>
</div>

<!-- Input drawer -->
<div id="input-drawer">
  <div id="input-inner">
    <div class="drawer-tabs">
      <button class="drawer-tab active" id="tab-url">URL</button>
      <button class="drawer-tab" id="tab-upload">Upload</button>
    </div>

    <div id="tab-url-panel" class="active">
      <input id="url-input" type="url" inputmode="url"
        placeholder="Paste image URL or Pinterest link"
        autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"/>
      <button id="add-url-btn">Add</button>
    </div>

    <div id="tab-upload-panel">
      <div id="drop-zone">
        <i class="ti ti-photo-up"></i>
        Drop images here or tap to browse
      </div>
    </div>
  </div>
</div>

<input type="file" id="file-input" accept="image/*" multiple>

<!-- Grid -->
<div id="grid"></div>
<div id="empty-state">
  <i class="ti ti-stack-2"></i>
  <p>Your archive is empty.<br>Add images via URL or upload.</p>
</div>

<!-- Lightbox -->
<div id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">

  <div id="lb-header">
    <span id="lb-counter">1 / 1</span>
    <div id="lb-actions">
      <button class="lb-btn" id="lb-close-btn" aria-label="Close">
        <i class="ti ti-x"></i>
      </button>
    </div>
  </div>

  <div id="lb-stage">
    <img id="lightbox-img" src="" alt="Full size preview" />
    <span id="swipe-hint">Swipe to navigate</span>
  </div>

  <div id="lb-footer">
    <button class="nav-arrow" id="prev-btn" aria-label="Previous">
      <i class="ti ti-chevron-left"></i>
    </button>
    <button class="nav-arrow" id="next-btn" aria-label="Next">
      <i class="ti ti-chevron-right"></i>
    </button>
  </div>

</div>

<script>
Auth.require();

// ── Supabase ──────────────────────────────────────────────────
const SB_URL = 'https://srunklqdxxuaicpzjrpz.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNydW5rbHFkeHh1YWljcHpqcnB6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNzY4MjEsImV4cCI6MjA5NDY1MjgyMX0.yBGqtYVBaHtJP07BD0mhBxdGI3s5CWRMLJU1ui96Ijo';
const TABLE  = 'archive_images';
const HDRS   = {
  'apikey': SB_KEY,
  'Authorization': 'Bearer ' + SB_KEY,
  'Content-Type': 'application/json',
  'Prefer': 'return=minimal'
};

async function dbLoad() {
  const r = await fetch(`${SB_URL}/rest/v1/${TABLE}?select=id,src,type,created_at&order=created_at.asc`, { headers: HDRS });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function dbInsert(row) {
  const r = await fetch(`${SB_URL}/rest/v1/${TABLE}`, { method: 'POST', headers: HDRS, body: JSON.stringify(row) });
  if (!r.ok) throw new Error(await r.text());
}
async function dbDelete(id) {
  const r = await fetch(`${SB_URL}/rest/v1/${TABLE}?id=eq.${encodeURIComponent(id)}`, { method: 'DELETE', headers: HDRS });
  if (!r.ok) throw new Error(await r.text());
}

// ── App ───────────────────────────────────────────────────────
(async () => {
  let images    = [];
  let lbIndex   = 0;
  let _lbImages = [];
  let swipeHintShown = false;

  const grid         = document.getElementById('grid');
  const emptyState   = document.getElementById('empty-state');
  const countBadge   = document.getElementById('count-badge');
  const syncDot      = document.getElementById('sync-dot');
  const lightbox     = document.getElementById('lightbox');
  const lbImg        = document.getElementById('lightbox-img');
  const lbCounter    = document.getElementById('lb-counter');
  const inputDrawer  = document.getElementById('input-drawer');
  const urlInput     = document.getElementById('url-input');
  const dropZone     = document.getElementById('drop-zone');
  const fileInput    = document.getElementById('file-input');
  const tabUrlBtn    = document.getElementById('tab-url');
  const tabUploadBtn = document.getElementById('tab-upload');
  const tabUrlPanel  = document.getElementById('tab-url-panel');
  const tabUploadPanel = document.getElementById('tab-upload-panel');
  const swipeHint    = document.getElementById('swipe-hint');

  // Sync state
  function setSync(state) {
    syncDot.className = state;
  }

  // Shuffle
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // Load
  async function loadImages() {
    setSync('syncing');
    try {
      images = await dbLoad();
      setSync('');
      updateCount();
    } catch(e) {
      console.error(e);
      setSync('error');
    }
    renderGrid(true);
  }

  function updateCount() {
    countBadge.textContent = images.length > 0 ? images.length : '';
  }

  async function addImage(row) {
    setSync('syncing');
    try {
      await dbInsert(row);
      images.push(row);
      setSync('');
      updateCount();
      renderGrid();
    } catch(e) {
      console.error(e);
      setSync('error');
    }
  }

  async function deleteImage(id) {
    setSync('syncing');
    try {
      await dbDelete(id);
      images = images.filter(i => i.id !== id);
      setSync('');
      updateCount();
      renderGrid();
    } catch(e) {
      console.error(e);
      setSync('error');
    }
  }

  function renderGrid(doShuffle = false) {
    const display = doShuffle ? shuffle(images) : images;
    grid.innerHTML = '';
    emptyState.classList.toggle('visible', display.length === 0);

    display.forEach((img, idx) => {
      const item = document.createElement('div');
      item.className = 'grid-item';

      const el = document.createElement('img');
      el.alt = '';
      el.onload  = () => { el.classList.add('loaded'); item.classList.add('img-loaded'); };
      el.onerror = () => { item.classList.add('img-loaded'); };
      el.src = img.src;

      const del = document.createElement('button');
      del.className = 'del-btn';
      del.setAttribute('aria-label', 'Remove');
      del.innerHTML = '<i class="ti ti-x"></i>';
      del.addEventListener('click', e => { e.stopPropagation(); deleteImage(img.id); });

      item.appendChild(el);
      item.appendChild(del);
      item.addEventListener('click', () => { lbIndex = idx; openLightbox(display); });
      grid.appendChild(item);
    });
  }

  // ── Drawer tabs ───────────────────────────────────────────────
  function switchTab(tab) {
    if (tab === 'url') {
      tabUrlBtn.classList.add('active');
      tabUploadBtn.classList.remove('active');
      tabUrlPanel.classList.add('active');
      tabUploadPanel.classList.remove('active');
      setTimeout(() => urlInput.focus(), 50);
    } else {
      tabUploadBtn.classList.add('active');
      tabUrlBtn.classList.remove('active');
      tabUploadPanel.classList.add('active');
      tabUrlPanel.classList.remove('active');
    }
  }

  function openDrawer(tab) {
    inputDrawer.classList.add('open');
    switchTab(tab);
    document.getElementById('url-toggle-btn').classList.toggle('active', tab === 'url');
    document.getElementById('upload-toggle-btn').classList.toggle('active', tab === 'upload');
  }

  function closeDrawer() {
    inputDrawer.classList.remove('open');
    document.getElementById('url-toggle-btn').classList.remove('active');
    document.getElementById('upload-toggle-btn').classList.remove('active');
  }

  function toggleDrawer(tab) {
    const isOpen = inputDrawer.classList.contains('open');
    const activeTab = tabUrlPanel.classList.contains('active') ? 'url' : 'upload';
    if (!isOpen || activeTab !== tab) {
      openDrawer(tab);
    } else {
      closeDrawer();
    }
  }

  document.getElementById('url-toggle-btn').addEventListener('click', () => toggleDrawer('url'));
  document.getElementById('upload-toggle-btn').addEventListener('click', () => toggleDrawer('upload'));
  tabUrlBtn.addEventListener('click', () => switchTab('url'));
  tabUploadBtn.addEventListener('click', () => switchTab('upload'));

  // ── Lightbox ──────────────────────────────────────────────────
  function openLightbox(imgs) {
    _lbImages = imgs;
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
    showLbImage();
    document.addEventListener('keydown', handleKey);
    // Show swipe hint once on touch devices
    if (!swipeHintShown && 'ontouchstart' in window && _lbImages.length > 1) {
      swipeHintShown = true;
      swipeHint.classList.add('show');
      setTimeout(() => swipeHint.classList.remove('show'), 2200);
    }
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
    document.removeEventListener('keydown', handleKey);
    resetZoom();
  }

  function showLbImage() {
    resetZoom();
    lbImg.style.opacity = 0;
    lbImg.src = _lbImages[lbIndex].src;
    lbImg.onload = () => { lbImg.style.opacity = 1; };
    lbCounter.textContent = (lbIndex + 1) + ' / ' + _lbImages.length;
  }

  function handleKey(e) {
    if (e.key === 'Escape')     closeLightbox();
    if (e.key === 'ArrowRight') { lbIndex = (lbIndex + 1) % _lbImages.length; showLbImage(); }
    if (e.key === 'ArrowLeft')  { lbIndex = (lbIndex - 1 + _lbImages.length) % _lbImages.length; showLbImage(); }
  }

  document.getElementById('lb-close-btn').addEventListener('click', closeLightbox);
  document.getElementById('next-btn').addEventListener('click', () => { lbIndex = (lbIndex + 1) % _lbImages.length; showLbImage(); });
  document.getElementById('prev-btn').addEventListener('click', () => { lbIndex = (lbIndex - 1 + _lbImages.length) % _lbImages.length; showLbImage(); });

  // ── Zoom & pan ────────────────────────────────────────────────
  const lbStage = document.getElementById('lb-stage');
  const MIN_SCALE = 1, MAX_SCALE = 6;
  let scale = 1, tx = 0, ty = 0;
  const activePointers = new Map();
  let pinchStartDist = 0, pinchStartScale = 1, pinchMid = { x: 0, y: 0 };
  let panLastX = 0, panLastY = 0;
  let panMoved = false;
  let pointerDownTime = 0;

  // Swipe state (for navigation)
  let swipeStartX = 0, swipeStartY = 0, swipeActive = false;

  function applyTransform() {
    lbImg.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
    lbImg.classList.toggle('zoomed', scale > 1.001);
  }

  function resetZoom() {
    scale = 1; tx = 0; ty = 0;
    applyTransform();
    lbImg.classList.remove('panning');
  }

  function clampPan() {
    if (scale <= 1.001) { tx = 0; ty = 0; return; }
    const rect  = lbImg.getBoundingClientRect();
    const sRect = lbStage.getBoundingClientRect();
    const maxX  = Math.max(0, (rect.width  - sRect.width)  / 2 + 60);
    const maxY  = Math.max(0, (rect.height - sRect.height) / 2 + 60);
    tx = Math.max(-maxX, Math.min(maxX, tx));
    ty = Math.max(-maxY, Math.min(maxY, ty));
  }

  function zoomAt(clientX, clientY, newScale) {
    newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, newScale));
    const rect      = lbImg.getBoundingClientRect();
    const imgCX     = rect.left + rect.width  / 2;
    const imgCY     = rect.top  + rect.height / 2;
    const offsetX   = clientX - imgCX;
    const offsetY   = clientY - imgCY;
    const ratio     = newScale / scale;
    tx = (tx - offsetX) * ratio + offsetX;
    ty = (ty - offsetY) * ratio + offsetY;
    scale = newScale;
    if (scale <= 1.001) { scale = 1; tx = 0; ty = 0; }
    clampPan();
    applyTransform();
  }

  // Wheel zoom
  lbStage.addEventListener('wheel', e => {
    e.preventDefault();
    zoomAt(e.clientX, e.clientY, scale * Math.exp(-e.deltaY * 0.0015));
  }, { passive: false });

  // Double-tap / double-click toggle zoom
  let lastTap = 0;
  lbImg.addEventListener('click', e => {
    const now = Date.now();
    if (now - lastTap < 300) {
      e.preventDefault();
      if (scale > 1.001) resetZoom();
      else zoomAt(e.clientX, e.clientY, 2.5);
    }
    lastTap = now;
  });

  // Pointer-based pinch + pan
  lbImg.addEventListener('pointerdown', e => {
    if (e.button && e.button !== 0) return;
    lbImg.setPointerCapture(e.pointerId);
    activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
    panMoved = false;
    pointerDownTime = Date.now();

    if (activePointers.size === 2) {
      const pts = Array.from(activePointers.values());
      pinchStartDist  = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y) || 1;
      pinchStartScale = scale;
      pinchMid = { x: (pts[0].x + pts[1].x) / 2, y: (pts[0].y + pts[1].y) / 2 };
    } else if (activePointers.size === 1) {
      panLastX = e.clientX;
      panLastY = e.clientY;
      swipeStartX = e.clientX;
      swipeStartY = e.clientY;
      swipeActive = scale <= 1.001;
      if (scale > 1.001) lbImg.classList.add('panning');
    }
  });

  lbImg.addEventListener('pointermove', e => {
    if (!activePointers.has(e.pointerId)) return;
    activePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });

    if (activePointers.size === 2) {
      const pts  = Array.from(activePointers.values());
      const dist = Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y) || 1;
      zoomAt(pinchMid.x, pinchMid.y, pinchStartScale * (dist / pinchStartDist));
      panMoved = true;
      swipeActive = false;
    } else if (activePointers.size === 1) {
      const dx = e.clientX - panLastX;
      const dy = e.clientY - panLastY;
      panLastX = e.clientX;
      panLastY = e.clientY;

      if (scale > 1.001) {
        tx += dx; ty += dy;
        if (Math.abs(dx) + Math.abs(dy) > 2) panMoved = true;
        clampPan();
        applyTransform();
        swipeActive = false;
      } else {
        // Track for swipe
        const totalDX = Math.abs(e.clientX - swipeStartX);
        const totalDY = Math.abs(e.clientY - swipeStartY);
        if (totalDX > 6 || totalDY > 6) panMoved = true;
        // Cancel swipe if more vertical than horizontal
        if (totalDY > totalDX + 10) swipeActive = false;
      }
    }
  });

  function endPointer(e) {
    if (!activePointers.has(e.pointerId)) return;

    // Swipe navigation (not zoomed, single finger, horizontal)
    if (swipeActive && activePointers.size === 1 && scale <= 1.001) {
      const totalDX = e.clientX - swipeStartX;
      const totalDY = Math.abs(e.clientY - swipeStartY);
      if (Math.abs(totalDX) > 50 && Math.abs(totalDX) > totalDY * 1.2) {
        lbIndex = totalDX < 0
          ? (lbIndex + 1) % _lbImages.length
          : (lbIndex - 1 + _lbImages.length) % _lbImages.length;
        showLbImage();
      }
    }

    activePointers.delete(e.pointerId);
    lbImg.classList.remove('panning');
    swipeActive = false;
  }

  lbImg.addEventListener('pointerup',     endPointer);
  lbImg.addEventListener('pointercancel', endPointer);
  lbImg.addEventListener('pointerleave',  endPointer);

  // ── URL add ───────────────────────────────────────────────────
  document.getElementById('add-url-btn').addEventListener('click', addFromUrl);
  urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') addFromUrl(); });

  function isPinterest(url) {
    return /pinterest\.(com|co\.[a-z]+)|pin\.it/i.test(url);
  }

  async function resolvePinterest(url) {
    const r = await fetch('/api/pinterest?url=' + encodeURIComponent(url));
    if (!r.ok) throw new Error('Pinterest API failed');
    const data = await r.json();
    if (data.img) return data.img;
    throw new Error(data.error || 'No image found');
  }

  async function addFromUrl() {
    const url = urlInput.value.trim();
    if (!url) return;
    urlInput.value = '';
    closeDrawer();

    if (isPinterest(url)) {
      setSync('syncing');
      try {
        const imgUrl = await resolvePinterest(url);
        addImage({ id: crypto.randomUUID(), src: imgUrl, type: 'url' });
      } catch(e) {
        console.error(e);
        setSync('error');
        addImage({ id: crypto.randomUUID(), src: url, type: 'url' });
      }
    } else {
      addImage({ id: crypto.randomUUID(), src: url, type: 'url' });
    }
  }

  // ── File upload ───────────────────────────────────────────────
  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    handleFiles(e.dataTransfer.files);
  });
  fileInput.addEventListener('change', e => handleFiles(e.target.files));

  function handleFiles(files) {
    Array.from(files).forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => addImage({ id: crypto.randomUUID(), src: ev.target.result, type: 'file' });
      reader.readAsDataURL(file);
    });
    closeDrawer();
  }

  // ── Shuffle ───────────────────────────────────────────────────
  document.getElementById('shuffle-btn').addEventListener('click', () => renderGrid(true));

  // ── Boot ──────────────────────────────────────────────────────
  loadImages();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
})();
</script>
</body>
</html>
