<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Archive">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<title>SYSTEM</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #intro-video {
    /* Natural size, never stretched — black bars fill the rest */
    max-width: 100vw;
    max-height: 100dvh;
    width: auto;
    height: auto;
    display: block;
    object-fit: contain;
    background: #000;
    pointer-events: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  /* Smooth fade-to-black before redirect */
  #fade {
    position: fixed;
    inset: 0;
    background: #000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
    z-index: 10;
  }
  #fade.out { opacity: 1; }
</style>
</head>
<body>

<video
  id="intro-video"
  src="intro.mp4"
  autoplay
  playsinline
  disablepictureinpicture
  disableremoteplayback
  preload="auto"
></video>

<div id="fade"></div>

<script>
(function () {
  const video = document.getElementById('intro-video');
  const fade  = document.getElementById('fade');

  function goToLogin() {
    fade.classList.add('out');
    setTimeout(function () {
      window.location.replace('login.html');
    }, 500);
  }

  // Normal path: video finishes → go to login
  video.addEventListener('ended', goToLogin);

  // If video fails to load/play, don't get stuck — go to login anyway
  video.addEventListener('error', goToLogin);

  // iOS sometimes needs a user gesture to start — if autoplay is blocked,
  // a tap anywhere will start it
  document.addEventListener('touchstart', function startOnTap() {
    video.play().catch(function () {});
    document.removeEventListener('touchstart', startOnTap);
  }, { once: true, passive: true });

  // Force play on load in case autoplay didn't fire
  video.addEventListener('canplay', function () {
    video.play().catch(function () {});
  }, { once: true });
})();
</script>
</body>
</html>
