<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Projects">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="manifest.json">
<script src="auth.js"></script>
<title>projects.</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100dvh;
    background: #0a0a0a;
    color: #e8e0d0;
    font-family: 'DM Mono', monospace;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 16px;
    border-bottom: 0.5px solid #222;
    position: sticky;
    top: 0;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 50;
  }

  #back-btn {
    background: transparent;
    border: 0.5px solid #2a1a1a;
    border-radius: 4px;
    color: #8aff6a;
    font-family: inherit;
    font-size: 11px;
    padding: 5px 9px;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 4px;
    text-shadow: 0 0 6px rgba(138,255,106,0.5);
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
  }
  #back-btn:hover { border-color: #8aff6a; }

  #toolbar {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .tb-btn {
    background: transparent;
    border: 0.5px solid #333;
    border-radius: 4px;
    color: #888;
    font-family: inherit;
    font-size: 11px;
    padding: 5px 9px;
    cursor: pointer;
    letter-spacing: 0.05em;
    display: flex; align-items: center; gap: 4px;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    transition: all 0.15s;
  }
  .tb-btn:hover, .tb-btn:active { border-color: #888; color: #e8e0d0; }
  .tb-btn.active { border-color: #8aff6a; color: #8aff6a; }

  #sync-status {
    font-size: 10px;
    letter-spacing: 0.08em;
    color: #444;
    display: flex; align-items: center; gap: 4px;
    white-space: nowrap;
  }
  #sync-status.syncing { color: #8aff6a; }
  #sync-status.error   { color: #ff6a6a; }

  #url-bar {
    display: none;
    gap: 8px;
    padding: 10px 16px;
    background: #0f0f0f;
    border-bottom: 0.5px solid #1a1a1a;
    align-items: center;
  }
  #url-bar.visible { display: flex; }

  #url-input {
    flex: 1; min-width: 0;
    background: #161616;
    border: 0.5px solid #2a2a2a;
    border-radius: 4px;
    color: #e8e0d0;
    font-family: inherit;
    font-size: 16px;
    padding: 7px 10px;
    outline: none;
  }
  #url-input:focus { border-color: #555; }
  #url-input::placeholder { color: #444; }

  #add-url-btn {
    background: #e8e0d0;
    border: none;
    border-radius: 4px;
    color: #0a0a0a;
    font-family: inherit;
    font-size: 11px;
    padding: 7px 12px;
    cursor: pointer;
    letter-spacing: 0.05em;
    flex-shrink: 0;
    touch-action: manipulation;
  }

  /* iPhone-style grid */
  #grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px 8px;
    padding: 22px 14px 80px;
    max-width: 760px;
    margin: 0 auto;
  }
  @media (max-width: 480px) { #grid { grid-template-columns: repeat(4, 1fr); gap: 22px 4px; padding: 22px 8px 80px; } }
  @media (min-width: 700px) { #grid { grid-template-columns: repeat(6, 1fr); } }
  @media (min-width: 1100px){ #grid { grid-template-columns: repeat(8, 1fr); } }

  .tile {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    touch-action: pan-y;
    position: relative;
    transition: transform 0.16s ease, opacity 0.16s ease;
  }
  .tile.dragging {
    opacity: 0.92;
    z-index: 30;
    transition: none;
  }
  .tile.shake {
    animation: shake 0.4s ease-in-out infinite;
  }
  @keyframes shake {
    0%,100% { transform: rotate(-1.2deg); }
    50%     { transform: rotate(1.2deg); }
  }

  .tile-icon {
    width: 64px; height: 64px;
    border-radius: 16px;
    background: linear-gradient(180deg, #2a2a2a, #1a1a1a);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.05) inset,
      0 6px 14px rgba(0,0,0,0.5);
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .tile-icon img {
    width: 70%; height: 70%;
    object-fit: contain;
    image-rendering: -webkit-optimize-contrast;
  }
  .tile-icon .placeholder {
    color: #555;
    font-size: 26px;
  }
  .tile-name {
    font-size: 11px;
    color: #e8e0d0;
    letter-spacing: 0.03em;
    text-align: center;
    max-width: 80px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-shadow: 0 1px 2px rgba(0,0,0,0.8);
  }

  .tile-del {
    position: absolute;
    top: -6px; left: -6px;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: #e8e0d0;
    color: #0a0a0a;
    border: 1.5px solid #0a0a0a;
    display: none;
    align-items: center; justify-content: center;
    font-size: 12px;
    cursor: pointer;
    z-index: 5;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .tile.shake .tile-del { display: flex; }

  /* Modal for project info */
  #modal-backdrop {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  #modal-backdrop.open { display: flex; }
  @media (min-width: 600px) {
    #modal-backdrop { align-items: center; }
  }

  #modal {
    width: 100%;
    max-width: 540px;
    background: #111;
    border-top: 0.5px solid #2a2a2a;
    border-radius: 14px 14px 0 0;
    padding: 18px 18px calc(18px + env(safe-area-inset-bottom, 0px));
    max-height: 88dvh;
    overflow-y: auto;
    color: #e8e0d0;
  }
  @media (min-width: 600px) {
    #modal { border-radius: 14px; border: 0.5px solid #2a2a2a; }
  }

  .modal-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-bottom: 14px;
    border-bottom: 0.5px solid #222;
    margin-bottom: 14px;
  }
  .modal-icon {
    width: 56px; height: 56px;
    border-radius: 14px;
    background: linear-gradient(180deg, #2a2a2a, #1a1a1a);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
  }
  .modal-icon img { width: 70%; height: 70%; object-fit: contain; }
  .modal-titles {
    flex: 1;
    min-width: 0;
  }
  .modal-title {
    font-size: 16px;
    font-weight: 500;
    color: #e8e0d0;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .modal-url {
    font-size: 11px;
    color: #8aff6a;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    border: 0.5px solid #2a1a1a;
    border-radius: 4px;
    padding: 3px 7px;
    margin-top: 4px;
    text-shadow: 0 0 6px rgba(138,255,106,0.4);
  }
  .modal-url:hover { border-color: #8aff6a; }

  .modal-close {
    background: transparent;
    border: 0.5px solid #333;
    border-radius: 4px;
    color: #888;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .modal-close:hover { border-color: #888; color: #e8e0d0; }

  .field {
    margin-bottom: 14px;
  }
  .field label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: #666;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .field input, .field textarea {
    width: 100%;
    background: #0a0a0a;
    border: 0.5px solid #2a2a2a;
    border-radius: 6px;
    color: #e8e0d0;
    font-family: inherit;
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
    resize: vertical;
  }
  .field input:focus, .field textarea:focus { border-color: #555; }
  .field textarea { min-height: 70px; line-height: 1.5; }

  .field .desc {
    background: #0a0a0a;
    border: 0.5px solid #1a1a1a;
    border-radius: 6px;
    color: #aaa;
    font-size: 12px;
    padding: 8px 10px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    padding-top: 14px;
    border-top: 0.5px solid #222;
  }
  .modal-actions button {
    background: transparent;
    border: 0.5px solid #333;
    border-radius: 4px;
    color: #888;
    font-family: inherit;
    font-size: 11px;
    padding: 7px 12px;
    cursor: pointer;
    letter-spacing: 0.05em;
    -webkit-tap-highlight-color: transparent;
  }
  .modal-actions button:hover { border-color: #888; color: #e8e0d0; }
  .modal-actions .danger { color: #ff8a8a; border-color: #3a1a1a; }
  .modal-actions .danger:hover { border-color: #ff8a8a; }
  .modal-actions .save { color: #8aff6a; border-color: #2a3a1a; }
  .modal-actions .save:hover { border-color: #8aff6a; }
  .modal-actions .spacer { flex: 1; }

  #empty-state {
    text-align: center;
    padding: 80px 20px;
    color: #333;
  }
  #empty-state i { font-size: 48px; display: block; margin-bottom: 16px; }
  #empty-state p { font-size: 12px; letter-spacing: 0.1em; line-height: 1.8; }
</style>

<body>

<div id="topbar">
  <a href="control-panel.html" id="back-btn"><i class="ti ti-arrow-left"></i> control panel</a>
  <div id="toolbar">
    <span id="sync-status"><i class="ti ti-cloud"></i><span id="sync-text">loading</span></span>
    <button class="tb-btn" id="url-toggle-btn"><i class="ti ti-plus"></i> add</button>
    <button class="tb-btn" id="edit-mode-btn"><i class="ti ti-arrows-move"></i> edit</button>
  </div>
</div>

<div id="url-bar">
  <input id="url-input" type="url" inputmode="url" placeholder="paste project URL…"
    autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"/>
  <button id="add-url-btn">add</button>
</div>

<div id="grid"></div>
<div id="empty-state" style="display:none">
  <i class="ti ti-apps"></i>
  <p>no projects yet.<br>tap + to add your first link.</p>
</div>

<!-- Modal -->
<div id="modal-backdrop" role="dialog" aria-modal="true">
  <div id="modal">
    <div class="modal-header">
      <div class="modal-icon"><img id="m-icon" src="" alt=""></div>
      <div class="modal-titles">
        <div class="modal-title" id="m-title">—</div>
        <a class="modal-url" id="m-url" href="#" target="_blank" rel="noopener">
          <i class="ti ti-external-link"></i> <span id="m-url-text">open</span>
        </a>
      </div>
      <button class="modal-close" id="m-close" aria-label="close"><i class="ti ti-x"></i></button>
    </div>

    <div class="field">
      <label>name</label>
      <input id="m-name-edit" type="text" />
    </div>

    <div class="field">
      <label>description</label>
      <div class="desc" id="m-desc">—</div>
    </div>

    <div class="field">
      <label>my notes</label>
      <textarea id="m-notes" placeholder="what is it, what does it do…"></textarea>
    </div>

    <div class="modal-actions">
      <button class="danger" id="m-delete"><i class="ti ti-trash"></i> delete</button>
      <span class="spacer"></span>
      <button class="save" id="m-save">save</button>
    </div>
  </div>
</div>

<script>
Auth.require();

// ── Supabase ─────────────────────────────────────────────────
const SB_URL = 'https://srunklqdxxuaicpzjrpz.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNydW5rbHFkeHh1YWljcHpqcnB6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNzY4MjEsImV4cCI6MjA5NDY1MjgyMX0.yBGqtYVBaHtJP07BD0mhBxdGI3s5CWRMLJU1ui96Ijo';
const TABLE = 'projects';
const HDRS = {
  'apikey': SB_KEY,
  'Authorization': 'Bearer ' + SB_KEY,
  'Content-Type': 'application/json',
  'Prefer': 'return=minimal'
};
const HDRS_REPR = { ...HDRS, 'Prefer': 'return=representation' };

async function dbLoad() {
  const r = await fetch(`${SB_URL}/rest/v1/${TABLE}?select=*&order=position.asc,created_at.asc`, { headers: HDRS });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function dbInsert(row) {
  const r = await fetch(`${SB_URL}/rest/v1/${TABLE}`, { method: 'POST', headers: HDRS_REPR, body: JSON.stringify(row) });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function dbUpdate(id, patch) {
  const r = await fetch(`${SB_URL}/rest/v1/${TABLE}?id=eq.${encodeURIComponent(id)}`, {
    method: 'PATCH', headers: HDRS, body: JSON.stringify(patch)
  });
  if (!r.ok) throw new Error(await r.text());
}
async function dbDelete(id) {
  const r = await fetch(`${SB_URL}/rest/v1/${TABLE}?id=eq.${encodeURIComponent(id)}`, {
    method: 'DELETE', headers: HDRS
  });
  if (!r.ok) throw new Error(await r.text());
}

// ── Helpers ──────────────────────────────────────────────────
function hostOf(u) {
  try { return new URL(u).hostname.replace(/^www\./, ''); }
  catch { return ''; }
}
function faviconFor(u) {
  const h = hostOf(u);
  if (!h) return '';
  return `https://www.google.com/s2/favicons?domain=${encodeURIComponent(h)}&sz=128`;
}
function escapeHTML(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

// Try to fetch og:title / og:description from our serverless function (optional, falls back if missing)
async function fetchMetadata(url) {
  try {
    const r = await fetch('/api/metadata?url=' + encodeURIComponent(url));
    if (!r.ok) return {};
    return await r.json();
  } catch { return {}; }
}

// ── State ────────────────────────────────────────────────────
let projects = [];
let editMode = false;
let openId = null;

const grid       = document.getElementById('grid');
const emptyState = document.getElementById('empty-state');
const syncStatus = document.getElementById('sync-status');
const syncText   = document.getElementById('sync-text');
const urlBar     = document.getElementById('url-bar');
const urlInput   = document.getElementById('url-input');
const editBtn    = document.getElementById('edit-mode-btn');
const backdrop   = document.getElementById('modal-backdrop');

function setSync(state, msg) {
  syncStatus.className = state;
  syncText.textContent = msg;
}

// ── Render ───────────────────────────────────────────────────
function render() {
  grid.innerHTML = '';
  emptyState.style.display = projects.length ? 'none' : 'block';

  projects.forEach((p, idx) => {
    const tile = document.createElement('div');
    tile.className = 'tile' + (editMode ? ' shake' : '');
    tile.dataset.id = p.id;

    const icon = document.createElement('div');
    icon.className = 'tile-icon';
    if (p.favicon) {
      const img = document.createElement('img');
      img.src = p.favicon;
      img.alt = '';
      img.onerror = () => {
        icon.innerHTML = '<span class="placeholder"><i class="ti ti-world"></i></span>';
      };
      icon.appendChild(img);
    } else {
      icon.innerHTML = '<span class="placeholder"><i class="ti ti-world"></i></span>';
    }

    const name = document.createElement('div');
    name.className = 'tile-name';
    name.textContent = p.title || hostOf(p.url) || 'untitled';

    const del = document.createElement('button');
    del.className = 'tile-del';
    del.innerHTML = '<i class="ti ti-x"></i>';
    del.addEventListener('click', e => {
      e.stopPropagation();
      if (confirm('Delete this project?')) deleteProject(p.id);
    });

    tile.appendChild(del);
    tile.appendChild(icon);
    tile.appendChild(name);

    // Click → open modal (suppressed during drag)
    tile.addEventListener('click', e => {
      if (tile._wasDragged) { tile._wasDragged = false; return; }
      if (e.target.closest('.tile-del')) return;
      openModal(p.id);
    });

    attachDragHandlers(tile);
    grid.appendChild(tile);
  });
}

// ── Drag-to-reorder (Pointer Events: works on touch + mouse) ─
let dragState = null;
function attachDragHandlers(tile) {
  tile.addEventListener('pointerdown', e => {
    if (e.target.closest('.tile-del')) return;
    if (e.pointerType === 'mouse' && e.button !== 0) return;

    const startX = e.clientX, startY = e.clientY;
    let activated = false;
    const id = tile.dataset.id;

    // Long-press to activate drag on touch; instant on mouse
    const activate = () => {
      activated = true;
      const rect = tile.getBoundingClientRect();
      const ph = document.createElement('div');
      ph.style.cssText = `width:${rect.width}px;height:${rect.height}px`;
      tile.parentNode.insertBefore(ph, tile);
      tile.style.position = 'fixed';
      tile.style.left = rect.left + 'px';
      tile.style.top  = rect.top + 'px';
      tile.style.width = rect.width + 'px';
      tile.classList.add('dragging');
      dragState = { id, tile, placeholder: ph, offsetX: e.clientX - rect.left, offsetY: e.clientY - rect.top };
      tile.setPointerCapture(e.pointerId);
    };

    const holdTimer = setTimeout(activate, e.pointerType === 'mouse' ? 0 : 280);

    const onMove = (ev) => {
      if (!activated) {
        const dx = ev.clientX - startX, dy = ev.clientY - startY;
        if (Math.hypot(dx, dy) > 8 && ev.pointerType !== 'mouse') {
          // moved before long-press finished → it's a scroll, cancel
          clearTimeout(holdTimer);
          tile.removeEventListener('pointermove', onMove);
          tile.removeEventListener('pointerup', onUp);
          tile.removeEventListener('pointercancel', onUp);
        }
        return;
      }
      tile.style.left = (ev.clientX - dragState.offsetX) + 'px';
      tile.style.top  = (ev.clientY - dragState.offsetY) + 'px';
      // Find which tile we are over
      const others = Array.from(grid.querySelectorAll('.tile')).filter(t => t !== tile);
      for (const t of others) {
        const r = t.getBoundingClientRect();
        if (ev.clientX > r.left && ev.clientX < r.right &&
            ev.clientY > r.top  && ev.clientY < r.bottom) {
          const phRect = dragState.placeholder.getBoundingClientRect();
          if (r.left + r.width/2 < phRect.left + phRect.width/2) {
            t.parentNode.insertBefore(dragState.placeholder, t);
          } else {
            t.parentNode.insertBefore(dragState.placeholder, t.nextSibling);
          }
          break;
        }
      }
    };

    const onUp = (ev) => {
      clearTimeout(holdTimer);
      tile.removeEventListener('pointermove', onMove);
      tile.removeEventListener('pointerup', onUp);
      tile.removeEventListener('pointercancel', onUp);
      if (!activated || !dragState) return;

      // Place tile where placeholder is
      dragState.placeholder.parentNode.insertBefore(tile, dragState.placeholder);
      dragState.placeholder.remove();
      tile.style.position = '';
      tile.style.left = '';
      tile.style.top  = '';
      tile.style.width = '';
      tile.classList.remove('dragging');
      tile._wasDragged = true;

      // Recompute order from DOM
      const newOrder = Array.from(grid.querySelectorAll('.tile')).map(t => t.dataset.id);
      reorderTo(newOrder);
      dragState = null;
    };

    tile.addEventListener('pointermove', onMove);
    tile.addEventListener('pointerup', onUp);
    tile.addEventListener('pointercancel', onUp);
  });
}

async function reorderTo(idsInOrder) {
  // Map new positions
  const map = new Map(idsInOrder.map((id, i) => [id, i]));
  projects.sort((a, b) => map.get(a.id) - map.get(b.id));
  projects.forEach((p, i) => p.position = i);
  setSync('syncing', 'reordering…');
  try {
    await Promise.all(projects.map(p => dbUpdate(p.id, { position: p.position })));
    setSync('', 'synced');
  } catch(e) {
    console.error(e);
    setSync('error', 'reorder failed');
  }
}

// ── Add ──────────────────────────────────────────────────────
document.getElementById('url-toggle-btn').addEventListener('click', () => {
  urlBar.classList.toggle('visible');
  if (urlBar.classList.contains('visible')) urlInput.focus();
});
document.getElementById('add-url-btn').addEventListener('click', addFromUrl);
urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') addFromUrl(); });

async function addFromUrl() {
  let url = urlInput.value.trim();
  if (!url) return;
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
  urlInput.value = '';
  urlBar.classList.remove('visible');

  setSync('syncing', 'fetching…');
  const meta = await fetchMetadata(url);
  const row = {
    url,
    title: meta.title || hostOf(url),
    description: meta.description || '',
    notes: '',
    favicon: faviconFor(url),
    position: projects.length
  };
  try {
    const created = await dbInsert(row);
    const inserted = Array.isArray(created) ? created[0] : created;
    projects.push(inserted || { ...row, id: crypto.randomUUID(), created_at: new Date().toISOString() });
    setSync('', 'synced');
    render();
  } catch(e) {
    console.error(e);
    setSync('error', 'save failed');
  }
}

// ── Delete ───────────────────────────────────────────────────
async function deleteProject(id) {
  setSync('syncing', 'deleting…');
  try {
    await dbDelete(id);
    projects = projects.filter(p => p.id !== id);
    setSync('', 'synced');
    render();
    if (openId === id) closeModal();
  } catch(e) {
    console.error(e);
    setSync('error', 'delete failed');
  }
}

// ── Edit mode toggle ─────────────────────────────────────────
editBtn.addEventListener('click', () => {
  editMode = !editMode;
  editBtn.classList.toggle('active', editMode);
  render();
});

// ── Modal ────────────────────────────────────────────────────
const mIcon = document.getElementById('m-icon');
const mTitle = document.getElementById('m-title');
const mUrl = document.getElementById('m-url');
const mUrlText = document.getElementById('m-url-text');
const mNameEdit = document.getElementById('m-name-edit');
const mDesc = document.getElementById('m-desc');
const mNotes = document.getElementById('m-notes');

function openModal(id) {
  const p = projects.find(x => x.id === id);
  if (!p) return;
  openId = id;
  mIcon.src = p.favicon || '';
  mTitle.textContent = p.title || hostOf(p.url) || 'untitled';
  mUrl.href = p.url;
  mUrlText.textContent = hostOf(p.url) || 'open';
  mNameEdit.value = p.title || '';
  mDesc.textContent = p.description || '— no description fetched —';
  mNotes.value = p.notes || '';
  backdrop.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  backdrop.classList.remove('open');
  document.body.style.overflow = '';
  openId = null;
}
document.getElementById('m-close').addEventListener('click', closeModal);
backdrop.addEventListener('click', e => { if (e.target === backdrop) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape' && openId) closeModal(); });

document.getElementById('m-save').addEventListener('click', async () => {
  if (!openId) return;
  const p = projects.find(x => x.id === openId);
  if (!p) return;
  const patch = { title: mNameEdit.value.trim() || hostOf(p.url), notes: mNotes.value };
  setSync('syncing', 'saving…');
  try {
    await dbUpdate(openId, patch);
    Object.assign(p, patch);
    setSync('', 'synced');
    render();
    closeModal();
  } catch(e) {
    console.error(e);
    setSync('error', 'save failed');
  }
});

document.getElementById('m-delete').addEventListener('click', () => {
  if (!openId) return;
  if (confirm('Delete this project?')) deleteProject(openId);
});

// ── Boot ────────────────────────────────────────────────────
(async () => {
  setSync('syncing', 'loading…');
  try {
    projects = await dbLoad();
    setSync('', 'synced');
  } catch(e) {
    console.error(e);
    setSync('error', 'offline');
  }
  render();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
})();
</script>
